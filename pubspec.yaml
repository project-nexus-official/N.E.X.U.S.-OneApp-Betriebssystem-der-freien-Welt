name: nexus_oneapp
description: "NEXUS OneApp – Dezentrale App für die Menschheitsfamilie"
publish_to: 'none'

version: 0.1.9+9

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^15.1.2

  # State Management
  provider: ^6.1.5

  # BLE Mesh
  flutter_blue_plus: ^1.35.3

  # Runtime permissions (Bluetooth + Location on Android)
  permission_handler: ^11.3.1

  # Local Database
  sqflite: ^2.4.2
  # Desktop SQLite FFI (required for Windows/Linux/macOS builds, not just tests)
  sqflite_common_ffi: ^2.3.3
  # Bundles sqlite3.dll/libsqlite3.so for desktop platforms
  sqlite3_flutter_libs: ^0.5.0

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Cryptography
  crypto: ^3.0.3
  cryptography: ^2.7.0

  # QR Code
  qr_flutter: ^4.1.0
  # Database path helper
  path: ^1.9.0

  # Profile image: picker + resize + file path
  image_picker: ^1.1.2
  image: ^4.3.0
  path_provider: ^2.1.5

  # Emoji picker panel
  emoji_picker_flutter: ^2.2.0

  # Nostr transport
  web_socket_channel: ^2.4.0
  pointycastle: ^3.7.3

  # Network connectivity monitoring (Nostr on/off)
  connectivity_plus: ^6.0.3

  # GPS for geohash-based Nostr channels
  geolocator: ^10.1.0

  # Retention settings persistence
  shared_preferences: ^2.3.5

  # Voice messages – recording + playback
  record: ^5.1.2
  audioplayers: ^6.1.0

  # QR code scanner (Android, iOS, macOS; manual fallback on Windows/Linux)
  mobile_scanner: ^6.0.0

  # Push notifications (local, no FCM)
  flutter_local_notifications: ^18.0.1
  # Background service for Nostr keepalive (Android)
  flutter_background_service: ^5.0.5

  # Update checker + native OS sharing
  http: ^1.2.0
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  # record_linux 0.7.2 is incompatible with record_platform_interface 1.5.0;
  # override to the version that implements the updated interface.
  record_linux: ^1.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/config/system.json
