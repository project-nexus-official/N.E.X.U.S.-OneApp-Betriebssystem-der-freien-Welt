name: nexus_oneapp
description: "NEXUS OneApp – Dezentrale App für die Menschheitsfamilie"
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Navigation
  go_router: ^15.1.2

  # State Management
  provider: ^6.1.5

  # BLE Mesh
  flutter_blue_plus: ^1.35.3

  # Runtime permissions (Bluetooth + Location on Android)
  permission_handler: ^11.3.1

  # Local Database
  sqflite: ^2.4.2

  # Secure Storage
  flutter_secure_storage: ^9.2.4

  # Cryptography
  crypto: ^3.0.3
  cryptography: ^2.7.0

  # QR Code
  qr_flutter: ^4.1.0
  # Database path helper
  path: ^1.9.0

  # Profile image: picker + resize + file path
  image_picker: ^1.1.2
  image: ^4.3.0
  path_provider: ^2.1.5

  # Emoji picker panel
  emoji_picker_flutter: ^2.2.0

  # Nostr transport
  web_socket_channel: ^2.4.0
  pointycastle: ^3.7.3

  # Network connectivity monitoring (Nostr on/off)
  connectivity_plus: ^6.0.3

  # GPS for geohash-based Nostr channels
  geolocator: ^10.1.0

  # Retention settings persistence
  shared_preferences: ^2.3.5

  # Voice messages – recording + playback
  record: ^5.1.2
  audioplayers: ^6.1.0

  # Push notifications (local, no FCM)
  flutter_local_notifications: ^18.0.1
  # Background service for Nostr keepalive (Android)
  flutter_background_service: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # SQLite in-memory testing
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
